name: 29888 Deploy

on:
  workflow_run:
    workflows: ["29888 Test"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Prenesi artefakt napaka.txt
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: napaka

      - name: Preveri ali je napaka.txt prazen
        run: |
          if [ -s napaka.txt ]; then
            echo "Namestitev preskocena - testiranje je zaznalo napake:"
            cat napaka.txt
            exit 1
          fi
          echo "Testiranje uspesno, nadaljujem z namestitvijo"

      - name: Prijava v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gradnja in objava Docker slike
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/29888-radix-sort:latest
